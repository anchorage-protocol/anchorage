name: deep-loop

# Manual-trigger only for now. The model-backed deep loop (a small
# population of real-LLM contributors — mostly honest-strong, plus one
# patient adversary — against a fresh Anchorage instance with a
# contested item the adversary can drift on) costs real Anthropic
# tokens, so it runs on demand rather than on every push. A `schedule:`
# trigger is the natural next step once an ANTHROPIC_API_KEY is
# provisioned in repo secrets. Without that secret the runner prints how
# to set a key and exits 0, so this workflow is safe even before the key
# exists — it just does nothing useful.
#
# The `runner` input picks between the single deep-loop run
# (`deep-loop`) and the model-backed parameter-sweep cube
# (`deep-loop-cube` — runs the loop once per cell of a swept defense
# parameter; the budget ceiling applies per cell, and `cube_cell`
# narrows to one cell). Neither writes cassettes here: re-baselining the
# checked-in golden fixtures is a local task that commits the result,
# not a CI side effect, so `ANCHORAGE_CASSETTE_MODE` stays unset and
# both runs hit the API live.

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'single deep-loop run or the parameter-sweep cube'
        type: choice
        options:
          - deep-loop
          - deep-loop-cube
        default: deep-loop
      model:
        description: 'Anthropic model id'
        required: false
        default: 'claude-haiku-4-5-20251001'
      budget_usd:
        description: 'USD spend ceiling (per run; per cell for the cube)'
        required: false
        default: '15'
      adversary_objective:
        description: "Patient adversary's hidden objective (blank = runner default; ignored by the cube)"
        required: false
        default: ''
      cube_cell:
        description: 'cube only: run just this one cell (blank = all cells)'
        required: false
        default: ''

jobs:
  deep-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: run the deep loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANCHORAGE_TESTBED_MODEL: ${{ inputs.model }}
          ANCHORAGE_POPULATION_BUDGET_USD: ${{ inputs.budget_usd }}
          ANCHORAGE_ADVERSARY_OBJECTIVE: ${{ inputs.adversary_objective }}
          ANCHORAGE_CUBE_CELL: ${{ inputs.cube_cell }}
        run: pnpm --filter @anchorage/server ${{ inputs.runner }}
