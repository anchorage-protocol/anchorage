version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Pin @types/node to the major that matches the engines floor (Node
    # 24, set in root package.json and the production Dockerfile).
    # Letting the types outpace the runtime means typecheck-clean code
    # can call APIs that do not exist on the deployed Node version.
    # Lift this when the engines floor moves.
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      dev-minor:
        dependency-type: development
        update-types: [minor, patch]
      prod-minor:
        dependency-type: production
        update-types: [minor, patch]
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: deps
      include: scope
